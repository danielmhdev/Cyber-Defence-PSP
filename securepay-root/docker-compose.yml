version: '3.8'
services:
  api-gateway:
    build: ./api-gateway
    ports:
      - "3000:3000"
    depends_on:
      - auth-service
      - transfer-service
  auth-service:
    build: ./auth-service
    ports:
      - "3001:3000"
  transfer-service:
    build: ./transfer-service
    ports:
      - "3002:3000"
  audit-logs:
    build: ./audit-logs
    ports:
      - "3003:3000"
